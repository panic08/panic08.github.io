<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@200;300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <title>Document</title>
  </head>
  <body>
    <div class="container">
      <form>
      <div class="card-block">
        <div class="card front">
          <div class="card-focus"></div>
          <div class="card-content">
            <div class="card-number">
              <div class="card-number-item">#</div>
              <div class="card-number-item">#</div>
              <div class="card-number-item">#</div>
              <div class="card-number-item">#</div>
              <div class="space"></div>
              <div class="card-number-item">#</div>
              <div class="card-number-item">#</div>
              <div class="card-number-item">#</div>
              <div class="card-number-item">#</div>
              <div class="space"></div>
              <div class="card-number-item">#</div>
              <div class="card-number-item">#</div>
              <div class="card-number-item">#</div>
              <div class="card-number-item">#</div>
              <div class="space"></div>
              <div class="card-number-item">#</div>
              <div class="card-number-item">#</div>
              <div class="card-number-item">#</div>
              <div class="card-number-item">#</div>
            </div>
            <div class="card-row">
              <div class="balance-wrapper">
                <div class="balance-text">Saldo de la tarjeta</div>
                <div class="balance">0.00$</div>
              </div>
              <div class="mm-block">
                <div class="mm-title">Expira</div>
                <div class="mm-yy">
                  <div class="mm">MM</div>
                  <div>/</div>
                  <div class="yy">YY</div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="card back">
          <div class="back-bg"></div>
          <div class="back-cvv">
            <div class="back-cvv-title">CVV</div>
            <div class="back-cvv-input">
              <input type="text" name="" id="back-cvv-input" />
            </div>
          </div>
        </div>
      </div>
      <div class="form-block">
        <div class="form-content">
          <div class="card-input">
            <div class="mm-yy-select-title">Número de tarjeta</div>
            <input type="text" id="card-input" required="text"/>
          </div>
          <div class="card-form-flex">
            <div class="mm-yy-select">
              <div class="mm-yy-select-title">Fecha de caducidad</div>
              <div class="month-block">
                <select name="" id="month-select" required>
                  <option value="" disabled="disabled" selected="selected">Mes</option>
                  <option value="01">01</option>
                  <option value="02">02</option>
                  <option value="03">03</option>
                  <option value="04">04</option>
                  <option value="05">05</option>
                  <option value="06">06</option>
                  <option value="07">07</option>
                  <option value="08">08</option>
                  <option value="09">09</option>
                  <option value="10">10</option>
                  <option value="11">11</option>
                  <option value="12">12</option>
                </select>
              </div>
              <div class="year-block">
                <select name="" id="year-select" required>
                  <option value="" disabled="disabled" selected="selected">Año</option>
                  <option value="2023">2023</option>
                  <option value="2024">2024</option>
                  <option value="2025">2025</option>
                  <option value="2026">2026</option>
                  <option value="2027">2027</option>
                  <option value="2028">2028</option>
                  <option value="2029">2029</option>
                  <option value="2030">2030</option>
                  <option value="2031">2031</option>
                  <option value="2032">2032</option>
                  <option value="2033">2033</option>
                  <option value="2034">2034</option>
                </select>
              </div>
            </div>
            <div class="cvv">
              <div class="cvv-title">CVV</div>
              <input type="text" id="cvv-input" class="cvv-input" required="text"/>
            </div>
          </div>
          <div class="balance-input">
            <div class="balance-input-saldo">Saldo de la tarjeta</div>
            <input type="text" id="balance-input"/>
          </div>
          <button type="submit" class="submit-btn">Enviar</button>
        </div>
      </form>
      </div>
    </div>
    
    <script src="main.js"></script>
  </body>
</html>
